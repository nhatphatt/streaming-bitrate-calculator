<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="460" rx="16" fill="#0f172a"/>
  <text x="400" y="36" text-anchor="middle" fill="#f1f5f9" font-size="18" font-weight="700">8 Ways to Reduce Video File Size (Ranked by Impact)</text>
  <!-- Bar chart -->
  <rect x="250" y="65" width="480" height="42" rx="6" fill="#ef4444" fill-opacity="0.3"/>
  <text x="240" y="91" text-anchor="end" fill="#f1f5f9" font-size="12" font-weight="600">1. Modern codec</text>
  <text x="740" y="91" fill="#ef4444" font-size="12" font-weight="700">~50% smaller</text>
  <rect x="250" y="115" width="430" height="42" rx="6" fill="#f97316" fill-opacity="0.3"/>
  <text x="240" y="141" text-anchor="end" fill="#f1f5f9" font-size="12" font-weight="600">2. Lower bitrate/CRF</text>
  <text x="690" y="141" fill="#f97316" font-size="12" font-weight="700">~40% smaller</text>
  <rect x="250" y="165" width="380" height="42" rx="6" fill="#f59e0b" fill-opacity="0.3"/>
  <text x="240" y="191" text-anchor="end" fill="#f1f5f9" font-size="12" font-weight="600">3. Lower resolution</text>
  <text x="640" y="191" fill="#f59e0b" font-size="12" font-weight="700">~75% smaller</text>
  <rect x="250" y="215" width="320" height="42" rx="6" fill="#eab308" fill-opacity="0.3"/>
  <text x="240" y="241" text-anchor="end" fill="#f1f5f9" font-size="12" font-weight="600">4. Lower frame rate</text>
  <text x="580" y="241" fill="#eab308" font-size="12" font-weight="700">~50% smaller</text>
  <rect x="250" y="265" width="260" height="42" rx="6" fill="#84cc16" fill-opacity="0.3"/>
  <text x="240" y="291" text-anchor="end" fill="#f1f5f9" font-size="12" font-weight="600">5. Trim footage</text>
  <text x="520" y="291" fill="#84cc16" font-size="12" font-weight="700">Varies</text>
  <rect x="250" y="315" width="140" height="42" rx="6" fill="#22c55e" fill-opacity="0.3"/>
  <text x="240" y="341" text-anchor="end" fill="#f1f5f9" font-size="12" font-weight="600">6. Optimize audio</text>
  <text x="400" y="341" fill="#22c55e" font-size="12" font-weight="700">~5-15%</text>
  <rect x="250" y="365" width="120" height="42" rx="6" fill="#14b8a6" fill-opacity="0.3"/>
  <text x="240" y="391" text-anchor="end" fill="#f1f5f9" font-size="12" font-weight="600">7. Two-pass encode</text>
  <text x="380" y="391" fill="#14b8a6" font-size="12" font-weight="700">~10-15%</text>
  <rect x="250" y="415" width="100" height="30" rx="6" fill="#06b6d4" fill-opacity="0.3"/>
  <text x="240" y="435" text-anchor="end" fill="#f1f5f9" font-size="12" font-weight="600">8. CPU encoding</text>
  <text x="360" y="435" fill="#06b6d4" font-size="12" font-weight="700">~5-10%</text>
</svg>
