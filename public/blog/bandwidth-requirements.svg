<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="320" rx="16" fill="#0f172a"/>
  <text x="400" y="36" text-anchor="middle" fill="#f1f5f9" font-size="18" font-weight="700">Streaming Bandwidth Requirements</text>
  <text x="400" y="56" text-anchor="middle" fill="#64748b" font-size="12">Minimum upload speed needed (rule: stream bitrate x 1.33)</text>
  <!-- Bars -->
  <text x="170" y="100" text-anchor="end" fill="#94a3b8" font-size="12">720p 30fps</text>
  <rect x="180" y="85" width="100" height="24" rx="4" fill="#22c55e" fill-opacity="0.3"/>
  <text x="290" y="102" fill="#22c55e" font-size="12" font-weight="600">5 Mbps</text>
  <text x="170" y="138" text-anchor="end" fill="#94a3b8" font-size="12">720p 60fps</text>
  <rect x="180" y="123" width="133" height="24" rx="4" fill="#22c55e" fill-opacity="0.3"/>
  <text x="323" y="140" fill="#22c55e" font-size="12" font-weight="600">6.7 Mbps</text>
  <text x="170" y="176" text-anchor="end" fill="#94a3b8" font-size="12">1080p 30fps</text>
  <rect x="180" y="161" width="160" height="24" rx="4" fill="#f59e0b" fill-opacity="0.3"/>
  <text x="350" y="178" fill="#f59e0b" font-size="12" font-weight="600">8 Mbps</text>
  <text x="170" y="214" text-anchor="end" fill="#94a3b8" font-size="12">1080p 60fps</text>
  <rect x="180" y="199" width="200" height="24" rx="4" fill="#f59e0b" fill-opacity="0.3"/>
  <text x="390" y="216" fill="#f59e0b" font-size="12" font-weight="600">10 Mbps</text>
  <text x="170" y="252" text-anchor="end" fill="#94a3b8" font-size="12">1440p 60fps</text>
  <rect x="180" y="237" width="360" height="24" rx="4" fill="#ef4444" fill-opacity="0.3"/>
  <text x="550" y="254" fill="#ef4444" font-size="12" font-weight="600">27 Mbps</text>
  <text x="170" y="290" text-anchor="end" fill="#94a3b8" font-size="12">4K 60fps</text>
  <rect x="180" y="275" width="520" height="24" rx="4" fill="#ef4444" fill-opacity="0.3"/>
  <text x="710" y="292" fill="#ef4444" font-size="12" font-weight="600">68 Mbps</text>
</svg>
