<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="300" rx="16" fill="#0f172a"/>
  <text x="400" y="36" text-anchor="middle" fill="#f1f5f9" font-size="18" font-weight="700">YouTube Channel Storage Planning</text>
  <text x="400" y="56" text-anchor="middle" fill="#64748b" font-size="12">Annual storage needs by upload frequency (1080p 60fps, HEVC source files)</text>
  <!-- Weekly uploads -->
  <rect x="50" y="80" width="220" height="200" rx="12" fill="#1e293b" stroke="#3b82f6" stroke-opacity="0.4"/>
  <text x="160" y="108" text-anchor="middle" fill="#3b82f6" font-size="14" font-weight="700">1 video/week</text>
  <text x="160" y="135" text-anchor="middle" fill="#f1f5f9" font-size="11">15 min avg length</text>
  <text x="160" y="172" text-anchor="middle" fill="#f1f5f9" font-size="28" font-weight="800">~200 GB</text>
  <text x="160" y="196" text-anchor="middle" fill="#94a3b8" font-size="12">/year</text>
  <rect x="75" y="220" width="170" height="28" rx="6" fill="#22c55e" fill-opacity="0.15"/>
  <text x="160" y="239" text-anchor="middle" fill="#22c55e" font-size="11">512 GB SSD is enough</text>
  <!-- 2x weekly -->
  <rect x="290" y="80" width="220" height="200" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-opacity="0.4"/>
  <text x="400" y="108" text-anchor="middle" fill="#f59e0b" font-size="14" font-weight="700">2 videos/week</text>
  <text x="400" y="135" text-anchor="middle" fill="#f1f5f9" font-size="11">15 min avg length</text>
  <text x="400" y="172" text-anchor="middle" fill="#f1f5f9" font-size="28" font-weight="800">~400 GB</text>
  <text x="400" y="196" text-anchor="middle" fill="#94a3b8" font-size="12">/year</text>
  <rect x="315" y="220" width="170" height="28" rx="6" fill="#f59e0b" fill-opacity="0.15"/>
  <text x="400" y="239" text-anchor="middle" fill="#f59e0b" font-size="11">1 TB SSD recommended</text>
  <!-- Daily -->
  <rect x="530" y="80" width="220" height="200" rx="12" fill="#1e293b" stroke="#ef4444" stroke-opacity="0.4"/>
  <text x="640" y="108" text-anchor="middle" fill="#ef4444" font-size="14" font-weight="700">Daily uploads</text>
  <text x="640" y="135" text-anchor="middle" fill="#f1f5f9" font-size="11">15 min avg length</text>
  <text x="640" y="172" text-anchor="middle" fill="#f1f5f9" font-size="28" font-weight="800">~1.4 TB</text>
  <text x="640" y="196" text-anchor="middle" fill="#94a3b8" font-size="12">/year</text>
  <rect x="555" y="220" width="170" height="28" rx="6" fill="#ef4444" fill-opacity="0.15"/>
  <text x="640" y="239" text-anchor="middle" fill="#ef4444" font-size="11">2-4 TB + backup plan</text>
</svg>
