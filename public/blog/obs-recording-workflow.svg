<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="350" rx="16" fill="#0f172a"/>
  <text x="400" y="36" text-anchor="middle" fill="#f1f5f9" font-size="18" font-weight="700">OBS Recording: Recommended Workflow</text>
  <!-- Step 1: Record -->
  <rect x="30" y="70" width="170" height="120" rx="12" fill="#1e293b" stroke="#3b82f6" stroke-opacity="0.5"/>
  <circle cx="115" cy="100" r="18" fill="#3b82f6" fill-opacity="0.2" stroke="#3b82f6"/>
  <text x="115" y="106" text-anchor="middle" fill="#3b82f6" font-size="16" font-weight="800">1</text>
  <text x="115" y="135" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="600">Record in MKV</text>
  <text x="115" y="155" text-anchor="middle" fill="#94a3b8" font-size="10">NVENC HEVC</text>
  <text x="115" y="170" text-anchor="middle" fill="#94a3b8" font-size="10">CQP 18-20</text>
  <!-- Arrow 1 -->
  <polygon points="210,130 230,120 230,125 260,125 260,135 230,135 230,140" fill="#3b82f6" fill-opacity="0.5"/>
  <!-- Step 2: Verify -->
  <rect x="270" y="70" width="170" height="120" rx="12" fill="#1e293b" stroke="#10b981" stroke-opacity="0.5"/>
  <circle cx="355" cy="100" r="18" fill="#10b981" fill-opacity="0.2" stroke="#10b981"/>
  <text x="355" y="106" text-anchor="middle" fill="#10b981" font-size="16" font-weight="800">2</text>
  <text x="355" y="135" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="600">Remux to MP4</text>
  <text x="355" y="155" text-anchor="middle" fill="#94a3b8" font-size="10">File &gt; Remux</text>
  <text x="355" y="170" text-anchor="middle" fill="#94a3b8" font-size="10">Instant, no quality loss</text>
  <!-- Arrow 2 -->
  <polygon points="450,130 470,120 470,125 500,125 500,135 470,135 470,140" fill="#10b981" fill-opacity="0.5"/>
  <!-- Step 3: Upload -->
  <rect x="510" y="70" width="170" height="120" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-opacity="0.5"/>
  <circle cx="595" cy="100" r="18" fill="#f59e0b" fill-opacity="0.2" stroke="#f59e0b"/>
  <text x="595" y="106" text-anchor="middle" fill="#f59e0b" font-size="16" font-weight="800">3</text>
  <text x="595" y="135" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="600">Upload MP4</text>
  <text x="595" y="155" text-anchor="middle" fill="#94a3b8" font-size="10">YouTube, Twitch, etc.</text>
  <text x="595" y="170" text-anchor="middle" fill="#94a3b8" font-size="10">Max compatibility</text>
  <!-- Settings recommendation -->
  <rect x="30" y="220" width="350" height="110" rx="12" fill="#1e293b" stroke="#3b82f6" stroke-opacity="0.3"/>
  <text x="205" y="248" text-anchor="middle" fill="#3b82f6" font-size="14" font-weight="700">Gaming Recording</text>
  <text x="205" y="272" text-anchor="middle" fill="#94a3b8" font-size="12">NVENC HEVC | CQP 20 | 1080p 60fps</text>
  <text x="205" y="292" text-anchor="middle" fill="#94a3b8" font-size="12">~3-5 GB/hour | Minimal FPS impact</text>
  <text x="205" y="312" text-anchor="middle" fill="#64748b" font-size="11">Use separate SSD for recording</text>
  <rect x="400" y="220" width="370" height="110" rx="12" fill="#1e293b" stroke="#10b981" stroke-opacity="0.3"/>
  <text x="585" y="248" text-anchor="middle" fill="#10b981" font-size="14" font-weight="700">Tutorial / Screencast</text>
  <text x="585" y="272" text-anchor="middle" fill="#94a3b8" font-size="12">NVENC HEVC | CQP 22 | 1080p 30fps</text>
  <text x="585" y="292" text-anchor="middle" fill="#94a3b8" font-size="12">~1-2 GB/hour | Perfect for text/UI</text>
  <text x="585" y="312" text-anchor="middle" fill="#64748b" font-size="11">30fps is ideal for screen content</text>
</svg>
