<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="380" rx="16" fill="#0f172a"/>
  <text x="400" y="36" text-anchor="middle" fill="#f1f5f9" font-size="18" font-weight="700">Recommended OBS Streaming Bitrate by Platform</text>
  <!-- Twitch -->
  <rect x="30" y="60" width="240" height="300" rx="12" fill="#1e293b" stroke="#9146ff" stroke-opacity="0.5"/>
  <rect x="30" y="60" width="240" height="45" rx="12" fill="#9146ff" fill-opacity="0.2"/>
  <text x="150" y="88" text-anchor="middle" fill="#9146ff" font-size="18" font-weight="800">Twitch</text>
  <text x="150" y="130" text-anchor="middle" fill="#94a3b8" font-size="11">Max: 6,000 Kbps (non-partner)</text>
  <rect x="50" y="150" width="200" height="30" rx="6" fill="#9146ff" fill-opacity="0.15"/>
  <text x="150" y="170" text-anchor="middle" fill="#f1f5f9" font-size="12">1080p 60fps: 6,000 Kbps</text>
  <rect x="50" y="188" width="200" height="30" rx="6" fill="#9146ff" fill-opacity="0.1"/>
  <text x="150" y="208" text-anchor="middle" fill="#cbd5e1" font-size="12">720p 60fps: 3,500-5,000</text>
  <rect x="50" y="226" width="200" height="30" rx="6" fill="#9146ff" fill-opacity="0.08"/>
  <text x="150" y="246" text-anchor="middle" fill="#cbd5e1" font-size="12">720p 30fps: 2,500-4,000</text>
  <text x="150" y="290" text-anchor="middle" fill="#64748b" font-size="11">Encoder: NVENC (new)</text>
  <text x="150" y="308" text-anchor="middle" fill="#64748b" font-size="11">Rate control: CBR</text>
  <text x="150" y="326" text-anchor="middle" fill="#64748b" font-size="11">Keyframe: 2 seconds</text>
  <!-- YouTube -->
  <rect x="280" y="60" width="240" height="300" rx="12" fill="#1e293b" stroke="#ff0000" stroke-opacity="0.5"/>
  <rect x="280" y="60" width="240" height="45" rx="12" fill="#ff0000" fill-opacity="0.2"/>
  <text x="400" y="88" text-anchor="middle" fill="#ff4444" font-size="18" font-weight="800">YouTube</text>
  <text x="400" y="130" text-anchor="middle" fill="#94a3b8" font-size="11">Higher limits, auto-transcoding</text>
  <rect x="300" y="150" width="200" height="30" rx="6" fill="#ff0000" fill-opacity="0.15"/>
  <text x="400" y="170" text-anchor="middle" fill="#f1f5f9" font-size="12">4K 60fps: 30,000-51,000</text>
  <rect x="300" y="188" width="200" height="30" rx="6" fill="#ff0000" fill-opacity="0.1"/>
  <text x="400" y="208" text-anchor="middle" fill="#cbd5e1" font-size="12">1440p 60fps: 12,000-20,000</text>
  <rect x="300" y="226" width="200" height="30" rx="6" fill="#ff0000" fill-opacity="0.08"/>
  <text x="400" y="246" text-anchor="middle" fill="#cbd5e1" font-size="12">1080p 60fps: 6,000-12,000</text>
  <text x="400" y="290" text-anchor="middle" fill="#64748b" font-size="11">Encoder: NVENC or x264</text>
  <text x="400" y="308" text-anchor="middle" fill="#64748b" font-size="11">Rate control: CBR</text>
  <text x="400" y="326" text-anchor="middle" fill="#64748b" font-size="11">Supports 4K + HDR</text>
  <!-- Kick -->
  <rect x="530" y="60" width="240" height="300" rx="12" fill="#1e293b" stroke="#53fc18" stroke-opacity="0.5"/>
  <rect x="530" y="60" width="240" height="45" rx="12" fill="#53fc18" fill-opacity="0.15"/>
  <text x="650" y="88" text-anchor="middle" fill="#53fc18" font-size="18" font-weight="800">Kick</text>
  <text x="650" y="130" text-anchor="middle" fill="#94a3b8" font-size="11">Max: 8,000 Kbps</text>
  <rect x="550" y="150" width="200" height="30" rx="6" fill="#53fc18" fill-opacity="0.1"/>
  <text x="650" y="170" text-anchor="middle" fill="#f1f5f9" font-size="12">1080p 60fps: 6,000-8,000</text>
  <rect x="550" y="188" width="200" height="30" rx="6" fill="#53fc18" fill-opacity="0.08"/>
  <text x="650" y="208" text-anchor="middle" fill="#cbd5e1" font-size="12">720p 60fps: 4,000-5,000</text>
  <text x="650" y="260" text-anchor="middle" fill="#64748b" font-size="11">Similar to Twitch settings</text>
  <text x="650" y="290" text-anchor="middle" fill="#64748b" font-size="11">Encoder: NVENC (new)</text>
  <text x="650" y="308" text-anchor="middle" fill="#64748b" font-size="11">Rate control: CBR</text>
  <text x="650" y="326" text-anchor="middle" fill="#64748b" font-size="11">Keyframe: 2 seconds</text>
</svg>
